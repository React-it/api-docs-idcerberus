name: Deploy docs to GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install Mintlify CLI
        run: npm i -g mint@latest

      - name: Validate docs
        run: mint validate

      - name: Export static docs
        run: mint export --output export.zip

      - name: Configure Pages
        id: pages
        uses: actions/configure-pages@v5

      - name: Prepare Pages artifact
        env:
          BASE_PATH: ${{ steps.pages.outputs.base_path }}
        run: |
          mkdir dist
          unzip -q export.zip -d dist
          if [ -n "$BASE_PATH" ]; then
            find dist -type f -name "*.html" -print0 \
              | xargs -0 sed -i \
                -e "s|href=\"/_next/|href=\"$BASE_PATH/_next/|g" \
                -e "s|src=\"/_next/|src=\"$BASE_PATH/_next/|g" \
                -e "s|href=\"/assets/|href=\"$BASE_PATH/assets/|g" \
                -e "s|src=\"/assets/|src=\"$BASE_PATH/assets/|g" \
                -e "s|href=\"/favicons/|href=\"$BASE_PATH/favicons/|g" \
                -e "s|src=\"/favicons/|src=\"$BASE_PATH/favicons/|g" \
                -e "s|content=\"/favicons/|content=\"$BASE_PATH/favicons/|g" \
                -e "s|href=\"/guides/|href=\"$BASE_PATH/guides/|g" \
                -e "s|href=\"/api-reference/|href=\"$BASE_PATH/api-reference/|g" \
                -e "s|href=\"/sitemap.xml|href=\"$BASE_PATH/sitemap.xml|g" \
                -e "s|href=\"/\"|href=\"$BASE_PATH/\"|g" \
                -e "s|\\\\\"/assets/|\\\\\"$BASE_PATH/assets/|g" \
                -e "s|\\\\\"/favicons/|\\\\\"$BASE_PATH/favicons/|g" \
                -e "s|%252Fassets%252F|%252Fapi-docs-idcerberus%252Fassets%252F|g" \
                -e "s|\\\\\"href\\\\\":\\\\\"/guides/|\\\\\"href\\\\\":\\\\\"$BASE_PATH/guides/|g" \
                -e "s|\\\\\"href\\\\\":\\\\\"/api-reference/|\\\\\"href\\\\\":\\\\\"$BASE_PATH/api-reference/|g" \
                -e "s|\"href\":\"/guides/|\"href\":\"$BASE_PATH/guides/|g" \
                -e "s|\"href\":\"/api-reference/|\"href\":\"$BASE_PATH/api-reference/|g"
            PAGES_BASE_SCRIPT='<script>(function(){var b="__BASE_PATH__";function f(h){if(!h||typeof h!=="string"||h[0]!=="/"||h.indexOf(b+"/")===0)return h;if(h==="/"||h.indexOf("/guides/")===0||h.indexOf("/api-reference/")===0)return b+(h==="/"?"/":h);return h}function n(){document.querySelectorAll("a[href]").forEach(function(a){var h=a.getAttribute("href"),x=f(h);if(x!==h)a.setAttribute("href",x)})}["pushState","replaceState"].forEach(function(m){var o=history[m];history[m]=function(s,t,u){if(typeof u==="string")u=f(u);return o.call(this,s,t,u)}});document.addEventListener("click",function(e){var a=e.target.closest&&e.target.closest("a[href]");if(!a||a.target||e.metaKey||e.ctrlKey||e.shiftKey||e.altKey)return;var h=a.getAttribute("href"),x=f(h);if(x!==h){e.preventDefault();window.location.assign(x)}},true);n();new MutationObserver(n).observe(document.documentElement,{childList:true,subtree:true})})();</script>'
            PAGES_BASE_SCRIPT="${PAGES_BASE_SCRIPT/__BASE_PATH__/$BASE_PATH}"
            export PAGES_BASE_SCRIPT
            find dist -type f -name "*.html" -print0 \
              | xargs -0 perl -0pi -e 's#</body>#$ENV{PAGES_BASE_SCRIPT}</body>#'
          fi
          touch dist/.nojekyll

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
