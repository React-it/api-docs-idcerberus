name: Deploy docs to GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install Mintlify CLI
        run: npm i -g mint@latest

      - name: Validate docs
        run: mint validate

      - name: Export static docs
        run: mint export --output export.zip

      - name: Configure Pages
        id: pages
        uses: actions/configure-pages@v5

      - name: Prepare Pages artifact
        env:
          BASE_PATH: ${{ steps.pages.outputs.base_path }}
        run: |
          mkdir dist
          unzip -q export.zip -d dist
          if [ -n "$BASE_PATH" ]; then
            find dist -type f \( -name "*.html" -o -name "*.js" -o -name "*.css" \) -print0 \
              | xargs -0 sed -i \
                -e "s|href=\"/|href=\"$BASE_PATH/|g" \
                -e "s|src=\"/|src=\"$BASE_PATH/|g" \
                -e "s|url(/|url($BASE_PATH/|g" \
                -e "s|'/_next/|'$BASE_PATH/_next/|g" \
                -e "s|\"/_next/|\"$BASE_PATH/_next/|g" \
                -e "s|'\/assets/|'$BASE_PATH/assets/|g" \
                -e "s|\"/assets/|\"$BASE_PATH/assets/|g" \
                -e "s|'\/guides/|'$BASE_PATH/guides/|g" \
                -e "s|\"/guides/|\"$BASE_PATH/guides/|g" \
                -e "s|'\/api-reference/|'$BASE_PATH/api-reference/|g" \
                -e "s|\"/api-reference/|\"$BASE_PATH/api-reference/|g"
          fi
          touch dist/.nojekyll

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
